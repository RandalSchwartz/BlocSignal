name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract PR Diff
        id: diff
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          else
            git diff HEAD~1..HEAD > pr_diff.txt
          fi

      - name: Execute Gemini Code Review
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || secrets.GITHUB_ACTION }}
        with:
          script: |
            const fs = require('fs');
            const apiKey = process.env.GEMINI_API_KEY;
            if (!apiKey) {
              console.log('⚠️ No GEMINI_API_KEY secret configured in repository settings. Skipping automated code review.');
              return;
            }

            const issueNumber = context.issue.number || context.payload.pull_request?.number;
            if (!issueNumber) {
              console.log('No pull request issue number found. Skipping review.');
              return;
            }

            let diff = '';
            try {
              diff = fs.readFileSync('pr_diff.txt', 'utf8');
            } catch (err) {
              console.log('No diff file found:', err.message);
              return;
            }

            if (!diff.trim()) {
              console.log('No diff changes found. Skipping review.');
              return;
            }

            const maxDiffLength = 50000;
            const truncatedDiff = diff.length > maxDiffLength 
              ? diff.substring(0, maxDiffLength) + '\n... (diff truncated)' 
              : diff;

            const prTitle = context.payload.pull_request?.title || 'PR Review';
            const prBody = context.payload.pull_request?.body || 'No description provided.';

            const prompt = "You are Gemini Code Assist (GCA), an expert automated code reviewer for Dart and Flutter monorepos.\n\n" +
              "Review the following Pull Request diff for the BlocSignal project:\n" +
              "- PR Title: " + prTitle + "\n" +
              "- PR Description: " + prBody + "\n\n" +
              "Diff:\n" +
              "```diff\n" +
              truncatedDiff + "\n" +
              "```\n\n" +
              "Provide a professional, concise code review covering:\n" +
              "1. 🔍 Architectural & Code Analysis\n" +
              "2. 🧪 Test Coverage & Static Analysis Compliance\n" +
              "3. 🎯 GCA Recommendation (🟢 APPROVE or 🟡 REQUEST CHANGES)\n\n" +
              "Format your response in clean GitHub Markdown with headings, bullet points, and an explicit GCA approval status tag.";

            const candidateModels = ['gemini-1.5-flash-002', 'gemini-2.5-flash', 'gemini-2.0-flash-exp'];
            let response;
            let reviewText = null;

            for (const model of candidateModels) {
              const url = 'https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + apiKey;
              console.log('Querying Gemini API (' + model + ')...');
              try {
                const res = await fetch(url, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                  })
                });

                if (res.ok) {
                  const data = await res.json();
                  reviewText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                  if (reviewText) {
                    response = res;
                    break;
                  }
                } else {
                  const errBody = await res.text();
                  console.log('Model ' + model + ' returned HTTP ' + res.status + ': ' + errBody);
                }
              } catch (e) {
                console.log('Fetch error for model ' + model + ':', e.message);
              }
            }

            if (!response || !response.ok || !reviewText) {
              const errText = response ? await response.text() : 'No response';
              console.log('⚠️ Gemini API Review Notice (' + (response ? response.status : 'error') + '):\n' + errText);
              console.log('Please verify GEMINI_API_KEY permissions in Google AI Studio / GCP Console.');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: '🤖 **Gemini Code Assist (GCA) Automated Review**\n\n' + reviewText
            });
            console.log('✅ Successfully posted automated code review to PR #' + issueNumber);
