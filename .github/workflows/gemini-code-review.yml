name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract PR Diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

      - name: Execute Gemini Code Review
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || secrets.GITHUB_ACTION }}
        with:
          script: |
            const fs = require('fs');
            const apiKey = process.env.GEMINI_API_KEY;
            if (!apiKey) {
              console.log('⚠️ No GEMINI_API_KEY secret configured in repository settings. Skipping automated code review.');
              return;
            }

            let diff = '';
            try {
              diff = fs.readFileSync('pr_diff.txt', 'utf8');
            } catch (err) {
              console.log('No diff file found:', err.message);
              return;
            }

            if (!diff.trim()) {
              console.log('No diff changes found. Skipping review.');
              return;
            }

            const maxDiffLength = 50000;
            const truncatedDiff = diff.length > maxDiffLength 
              ? diff.substring(0, maxDiffLength) + '\n... (diff truncated)' 
              : diff;

            const prTitle = context.payload.pull_request.title || 'No title';
            const prBody = context.payload.pull_request.body || 'No description provided.';

            const prompt = `You are Gemini Code Assist (GCA), an expert automated code reviewer for Dart and Flutter monorepos.

Review the following Pull Request diff for the BlocSignal project:
- PR Title: ${prTitle}
- PR Description: ${prBody}

Diff:
\`\`\`diff
${truncatedDiff}
\`\`\`

Provide a professional, concise code review covering:
1. 🔍 Architectural & Code Analysis
2. 🧪 Test Coverage & Static Analysis Compliance
3. 🎯 GCA Recommendation (🟢 APPROVE or 🟡 REQUEST CHANGES)

Format your response in clean GitHub Markdown with headings, bullet points, and an explicit GCA approval status tag.`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }]
              })
            });

            if (!response.ok) {
              const errText = await response.text();
              throw new Error(`Gemini API Error (${response.status}): ${errText}`);
            }

            const data = await response.json();
            const reviewText = data.candidates?.[0]?.content?.parts?.[0]?.text;

            if (reviewText) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `🤖 **Gemini Code Assist (GCA) Automated Review**\n\n${reviewText}`
              });
            } else {
              console.log('Gemini API returned no candidates/text.');
            }
